<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1050"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8365d"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="70" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="140" cy="130" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="420" cy="90" r="2" fill="white" opacity="0.8"/>
  <circle cx="460" cy="160" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="370" cy="50" r="2" fill="white" opacity="0.7"/>
  <circle cx="50" cy="200" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="480" cy="300" r="2" fill="white" opacity="0.5"/>
  <circle cx="100" cy="400" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="430" cy="430" r="2" fill="white" opacity="0.6"/>
  <!-- Rocket (tilted 45deg) -->
  <g transform="translate(256,256) rotate(-35)">
    <!-- Flame -->
    <ellipse cx="0" cy="115" rx="22" ry="35" fill="#ff6b35" opacity="0.7"/>
    <ellipse cx="0" cy="120" rx="13" ry="22" fill="#ffc107" opacity="0.9"/>
    <!-- Body -->
    <rect x="-36" y="-80" width="72" height="160" rx="36" fill="url(#glow)"/>
    <!-- Nose cone -->
    <ellipse cx="0" cy="-80" rx="36" ry="18" fill="#ff8c55"/>
    <path d="M-36,-80 Q0,-140 36,-80 Z" fill="#ff6b35"/>
    <!-- Left fin -->
    <polygon points="-36,40 -70,90 -36,90" fill="#c41e3a"/>
    <!-- Right fin -->
    <polygon points="36,40 70,90 36,90" fill="#c41e3a"/>
    <!-- Window -->
    <circle cx="0" cy="-20" r="16" fill="#6ee7f7" opacity="0.85"/>
    <circle cx="0" cy="-20" r="10" fill="#bdf6ff" opacity="0.6"/>
  </g>
</svg>
