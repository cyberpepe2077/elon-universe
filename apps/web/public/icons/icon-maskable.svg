<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1050"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8365d"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
  </defs>
  <!-- Full background (maskable: safe zone is center 80%) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="70" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="140" cy="130" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="420" cy="90" r="2" fill="white" opacity="0.8"/>
  <circle cx="460" cy="160" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="370" cy="50" r="2" fill="white" opacity="0.7"/>
  <circle cx="480" cy="300" r="2" fill="white" opacity="0.5"/>
  <circle cx="430" cy="430" r="2" fill="white" opacity="0.6"/>
  <!-- Rocket (within safe zone) -->
  <g transform="translate(256,256) rotate(-35)">
    <!-- Flame -->
    <ellipse cx="0" cy="100" rx="18" ry="28" fill="#ff6b35" opacity="0.7"/>
    <ellipse cx="0" cy="104" rx="10" ry="18" fill="#ffc107" opacity="0.9"/>
    <!-- Body -->
    <rect x="-30" y="-70" width="60" height="135" rx="30" fill="url(#glow)"/>
    <!-- Nose cone -->
    <path d="M-30,-70 Q0,-120 30,-70 Z" fill="#ff8c55"/>
    <!-- Left fin -->
    <polygon points="-30,35 -58,75 -30,75" fill="#c41e3a"/>
    <!-- Right fin -->
    <polygon points="30,35 58,75 30,75" fill="#c41e3a"/>
    <!-- Window -->
    <circle cx="0" cy="-15" r="14" fill="#6ee7f7" opacity="0.85"/>
    <circle cx="0" cy="-15" r="8" fill="#bdf6ff" opacity="0.6"/>
  </g>
</svg>
